<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; width: 100%; height: 100%; }
  #canvas { width: 100%; height: 100%; }
  #canvas canvas { display: block; width: 100% !important; height: 100% !important; }
</style>
</head>
<body>
<div id="canvas"></div>

<script src="three.min.js"></script>
<script src="cannon.min.js"></script>
<script src="teal.js"></script>
<script src="dice.js"></script>
<script>
(function() {
    var canvas = document.getElementById('canvas');

    var box = new $t.dice.dieBox(canvas);

    var notation = {
        set: [{ type: 'd20' }],
        constant: 0
    };

    // Throw from bottom-left toward upper-right with ~25° variation
    var baseAngle = Math.PI / 3;  // 60° = steeper toward top-right
    var spread = (Math.random() - 0.5) * (Math.PI / 3.6);  // ±25°
    var angle = baseAngle + spread;
    var coords = { x: Math.cos(angle), y: Math.sin(angle) };
    var boost = (Math.random() * 0.5 + 1.0) * Math.min(canvas.clientWidth, canvas.clientHeight);

    function beforeRoll() { /* no UI to hide */ }

    function afterRoll(notation, result) {
        var value = result[0];
        // Call back into Android
        if (window.Android && Android.onDiceResult) {
            Android.onDiceResult(value);
        }
    }

    // Auto-throw on load
    box.rollDice(notation, coords, boost, beforeRoll, afterRoll);
})();
</script>
</body>
</html>
